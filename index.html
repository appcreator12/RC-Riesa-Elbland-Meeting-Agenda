<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>RC Riesa-Elbland · Vereinssitzung</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<style>
:root {
  --blue:   #003F87;
  --blue2:  #0050AC;
  --gold:   #F7A81B;
  --gold2:  #FFC94A;
  --white:  #FFFFFF;
  --offwht: #F0F5FF;
  --light:  #E8EFF8;
  --muted:  #7A90B5;
  --text:   #1A2B4A;
  --card:   #FFFFFF;
  --shadow: 0 4px 24px rgba(0,63,135,.10);
  --r: 10px;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'DM Sans', sans-serif;
  background: var(--blue);
  color: var(--text);
  height: 100dvh;
  overflow: hidden;
  user-select: none;
}

/* ── SLIDES ─────────────────────────────── */
#slides {
  width: 100vw; height: 100dvh;
  position: relative;
  overflow: hidden;
}

.slide {
  position: absolute;
  inset: 0;
  opacity: 0;
  pointer-events: none;
  transition: opacity .45s cubic-bezier(.4,0,.2,1),
              transform .45s cubic-bezier(.4,0,.2,1);
  transform: translateX(60px);
}
.slide.active {
  opacity: 1; pointer-events: all; transform: translateX(0);
}
.slide.prev {
  opacity: 0; transform: translateX(-60px);
}

/* ── PROGRESS BAR ────────────────────────── */
#progress-bar {
  position: fixed; top: 0; left: 0; height: 3px;
  background: var(--gold);
  transition: width .4s ease;
  z-index: 100;
  box-shadow: 0 0 8px var(--gold);
}

/* ── NAV ARROWS ──────────────────────────── */
.nav-btn {
  position: fixed; top: 50%; transform: translateY(-50%);
  width: 44px; height: 44px;
  background: rgba(255,255,255,.12);
  border: 1px solid rgba(255,255,255,.2);
  backdrop-filter: blur(8px);
  border-radius: 50%;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  z-index: 50;
  transition: background .2s, opacity .2s;
  opacity: .7;
}
.nav-btn:hover { background: rgba(255,255,255,.25); opacity: 1; }
.nav-btn svg { width: 18px; height: 18px; fill: white; }
#btn-prev { left: 16px; }
#btn-next { right: 16px; }
#btn-prev.hidden, #btn-next.hidden { opacity: 0; pointer-events: none; }

/* ── SLIDE COUNTER ───────────────────────── */
#counter {
  position: fixed; bottom: 18px; right: 22px;
  font-size: 11px; font-weight: 500; letter-spacing: .06em;
  color: rgba(255,255,255,.45);
  z-index: 50;
}

/* ── TOOLBAR ─────────────────────────────── */
#toolbar {
  position: fixed; top: 16px; right: 16px;
  display: flex; gap: 8px;
  z-index: 100;
}
.tb-btn {
  height: 36px; padding: 0 14px;
  border-radius: 18px;
  border: 1.5px solid rgba(255,255,255,.25);
  background: rgba(0,0,0,.25);
  backdrop-filter: blur(10px);
  color: rgba(255,255,255,.85);
  font-family: 'DM Sans', sans-serif;
  font-size: 12px; font-weight: 500;
  cursor: pointer;
  display: flex; align-items: center; gap: 6px;
  transition: background .2s, border-color .2s;
}
.tb-btn:hover { background: rgba(255,255,255,.2); border-color: rgba(255,255,255,.5); }
.tb-btn.active { background: var(--gold); border-color: var(--gold); color: var(--blue); }
.tb-btn svg { width: 14px; height: 14px; }

/* ══════════════════════════════════════════
   SLIDE 1 – TITLE  (top: text | bottom: image)
══════════════════════════════════════════ */
#slide-0 {
  background: var(--blue);
  display: flex; flex-direction: column;
  overflow: hidden;
  /* position intentionally NOT set here — inherits absolute+inset:0 from .slide */
}

/* ── Top section (navy, text) ────────────── */
.title-top {
  flex: 0 0 38%;
  background: var(--blue);
  display: flex; flex-direction: column;
  justify-content: center;
  padding: clamp(16px,3vh,36px) clamp(28px,4.5vw,64px);
  position: relative; overflow: hidden;
}

/* Decorative wheel — faint, right side of top */
.bg-wheel {
  position: absolute; right: -2%; top: 50%;
  transform: translateY(-50%);
  width: clamp(200px,32vw,400px);
  opacity: .06; pointer-events: none; z-index: 0;
}

/* Gold divider between top and bottom */
.title-divider-bar {
  height: 4px; flex-shrink: 0;
  background: var(--gold);
}

/* ── Bottom image section ────────────────── */
.title-img-bottom {
  flex: 1;
  position: relative;
  background: #0a1a3a;
  overflow: hidden;
}
.title-img-bottom .img-fill {
  position: absolute; inset: 0;
  background-size: contain; background-position: center; background-repeat: no-repeat;
  transition: opacity .5s ease;
}
/* Placeholder pattern when no image */
.title-img-bottom .img-placeholder {
  position: absolute; inset: 0;
  background: rgba(0,10,40,.5);
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  gap: 10px; color: rgba(255,255,255,.55);
  font-size: clamp(13px,1.3vw,17px); letter-spacing: .04em;
  border: 2px dashed rgba(255,255,255,.15);
  margin: 12px; border-radius: 8px;
  transition: background .2s;
}
body.edit-mode .title-img-bottom .img-placeholder {
  border-color: rgba(247,168,27,.5);
  color: rgba(255,255,255,.8);
  cursor: pointer;
}
.title-img-bottom .img-placeholder svg {
  width: clamp(32px,4vw,52px); height: clamp(32px,4vw,52px); opacity: .6;
}

/* Upload hover zone — bottom panel only in edit mode */
#title-upload-zone {
  position: absolute; inset: 0; z-index: 20;
  display: none; align-items: center; justify-content: center;
  cursor: pointer;
  background: rgba(0,20,60,.35);
  backdrop-filter: blur(2px);
  transition: background .2s;
}
body.edit-mode #title-upload-zone { display: flex; }
#title-upload-zone:hover { background: rgba(0,20,60,.55); }
#title-upload-zone:hover .img-change-badge { opacity: 1; transform: scale(1.04); }

.img-change-badge {
  background: rgba(0,0,0,.6);
  backdrop-filter: blur(12px);
  border: 2px solid rgba(255,255,255,.3);
  border-radius: 16px;
  padding: 16px 26px;
  display: flex; flex-direction: column; align-items: center; gap: 8px;
  color: white; font-size: 13px; font-weight: 500;
  opacity: 0; transform: scale(.96);
  transition: opacity .25s, transform .25s;
  pointer-events: none;
}
.img-change-badge svg { width: 28px; height: 28px; opacity: .85; }

/* ── Top content elements ────────────────── */
.title-top-bar {
  position: absolute; top: clamp(14px,2.5vh,28px); right: clamp(18px,2.5vw,36px);
  z-index: 10;
  background: rgba(255,255,255,.15);
  backdrop-filter: blur(14px);
  -webkit-backdrop-filter: blur(14px);
  border: 1px solid rgba(255,255,255,.25);
  border-radius: 16px;
  padding: clamp(10px,1.6vh,18px) clamp(16px,2.4vw,28px);
  display: flex; align-items: center;
}
.title-content {
  position: relative; z-index: 2;
  display: flex; flex-direction: column;
}
.title-accent-line {
  width: clamp(32px,3.5vw,50px); height: 3px;
  background: var(--gold); border-radius: 2px;
  margin-bottom: clamp(8px,1.4vh,16px);
}
.title-eyebrow {
  font-size: clamp(11px,1.1vw,15px);
  font-weight: 600; letter-spacing: .2em;
  color: var(--gold); text-transform: uppercase;
  margin-bottom: clamp(6px,1vh,12px);
}
.title-main {
  font-family: 'DM Serif Display', serif;
  font-size: clamp(44px,7.5vw,100px);
  line-height: .97; color: white;
  margin-bottom: clamp(12px,2vh,22px);
  text-shadow: 0 2px 20px rgba(0,0,0,.25);
}
.title-divider {
  width: 100%; height: 1px;
  background: rgba(255,255,255,.14);
  margin-bottom: clamp(10px,1.6vh,18px);
}
.title-date-row { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
.title-date-pill {
  background: var(--gold); color: var(--blue);
  font-size: clamp(13px,1.3vw,18px); font-weight: 700;
  letter-spacing: .04em; padding: 6px 18px; border-radius: 20px;
  white-space: nowrap;
}
.title-slogan {
  margin-top: clamp(8px,1.4vh,14px);
  font-size: clamp(12px,1.1vw,16px); font-style: italic;
  color: rgba(255,255,255,.52); letter-spacing: .02em;
}

/* ══════════════════════════════════════════
   SLIDE 2 – AGENDA OVERVIEW
══════════════════════════════════════════ */
#slide-1 {
  background: var(--offwht);
  display: flex; flex-direction: column;
}
.hdr {
  background: var(--blue);
  padding: 0 4vw;
  height: clamp(72px, 12vh, 100px);
  display: flex; align-items: center; justify-content: space-between;
  flex-shrink: 0;
  border-bottom: 4px solid var(--gold);
}
.hdr-title {
  font-size: clamp(20px, 2.8vw, 34px);
  font-weight: 600; letter-spacing: .12em;
  color: white; text-transform: uppercase;
}
.hdr-logo { height: clamp(34px, 5.5vh, 56px); }

.agenda-grid {
  flex: 1;
  display: grid;
  grid-template-columns: 1fr 1fr;
  grid-template-rows: repeat(3, 1fr);
  gap: clamp(8px, 1.2vh, 14px);
  padding: clamp(10px, 2vh, 22px) clamp(16px, 3vw, 40px);
}
.agenda-card {
  background: white;
  border-radius: var(--r);
  border: 1px solid var(--light);
  display: flex; align-items: stretch;
  box-shadow: var(--shadow);
  overflow: hidden;
  transition: transform .18s, box-shadow .18s;
}
.agenda-card:hover { transform: translateY(-2px); box-shadow: 0 8px 32px rgba(0,63,135,.13); }
.ac-bar { width: 7px; background: var(--gold); flex-shrink: 0; }
.ac-body { padding: clamp(10px, 1.4vh, 18px) clamp(12px, 1.8vw, 22px); display: flex; flex-direction: column; justify-content: center; gap: 4px; }
.ac-num { font-size: clamp(24px, 3.2vw, 40px); font-weight: 700; color: var(--blue); line-height: 1; }
.ac-sep { width: 100%; height: 1px; background: var(--light); margin: 5px 0; }
.ac-name { font-size: clamp(15px, 1.8vw, 22px); color: var(--text); font-weight: 500; }

.slide-footer {
  height: 32px; background: white;
  display: flex; align-items: center; justify-content: center;
  border-top: 2px solid var(--gold);
  font-size: 10px; letter-spacing: .08em;
  color: var(--muted); flex-shrink: 0;
  text-transform: uppercase;
}

/* ══════════════════════════════════════════
   SLIDES 3–8 – CONTENT SLIDES
══════════════════════════════════════════ */
.content-slide {
  background: var(--offwht);
  display: flex; flex-direction: column;
}
.cs-body {
  flex: 1; padding: clamp(10px, 1.8vh, 20px) clamp(16px, 3vw, 40px);
  display: flex; flex-direction: column; gap: clamp(6px, 1vh, 12px);
  overflow: hidden;
}
.cs-subtitle {
  font-size: clamp(13px, 1.4vw, 18px);
  font-style: italic; color: var(--muted);
  padding-left: 2px;
}
.cs-card {
  flex: 1;
  background: white;
  border-radius: var(--r);
  border: 1px solid var(--light);
  box-shadow: var(--shadow);
  position: relative;
  overflow: hidden;
  display: flex; flex-direction: column;
}
.cs-card-inner {
  flex: 1; padding: clamp(14px, 2vh, 22px) clamp(16px, 2.5vw, 28px);
  position: relative; z-index: 2;
  overflow-y: auto;
}

/* Watermark wheel */
.cs-watermark {
  position: absolute;
  right: -4%; bottom: -8%;
  width: 52%; opacity: .05;
  pointer-events: none; z-index: 1;
}

/* ── FREE-POSITION IMAGES ────────────────────── */
.free-img-layer {
  position: absolute; inset: 0;
  pointer-events: none; z-index: 12;
}
.fi-item {
  position: absolute;
  cursor: move;
  user-select: none;
  pointer-events: auto;
}
.fi-item img {
  width: 100%; height: 100%;
  object-fit: contain; display: block;
  border-radius: 4px;
  box-shadow: 0 3px 14px rgba(0,0,0,.25);
  pointer-events: none;
}
/* Delete button — top-right, always visible in edit mode */
.fi-del {
  position: absolute; top: -10px; right: -10px;
  width: 24px; height: 24px; border-radius: 50%;
  background: #c0392b; color: white; border: 2px solid white;
  font-size: 12px; cursor: pointer; line-height: 20px;
  text-align: center; padding: 0; z-index: 2;
  display: none; align-items: center; justify-content: center;
  box-shadow: 0 2px 6px rgba(0,0,0,.3);
}
body.edit-mode .fi-del { display: flex; }
/* Resize handle — bottom-right corner */
.fi-handle {
  position: absolute; bottom: -8px; right: -8px;
  width: 18px; height: 18px;
  background: var(--gold); border-radius: 4px;
  cursor: se-resize; border: 2px solid white;
  box-shadow: 0 1px 4px rgba(0,0,0,.3);
  display: none; z-index: 2;
}
body.edit-mode .fi-handle { display: block; }
/* Blue outline on hover in edit mode */
body.edit-mode .fi-item:hover { outline: 2px solid var(--gold); outline-offset: 2px; }
/* Add button */
.fi-add-btn {
  position: absolute; bottom: 14px; right: 14px;
  display: none; align-items: center; gap: 6px;
  background: var(--blue); color: white;
  border: none; border-radius: 20px;
  padding: 7px 14px; font-size: 12px; font-weight: 500;
  font-family: 'DM Sans', sans-serif;
  cursor: pointer; pointer-events: auto;
  box-shadow: 0 2px 10px rgba(0,63,135,.4);
  transition: background .2s, transform .15s;
  z-index: 15;
}
.fi-add-btn:hover { background: var(--blue2); transform: scale(1.04); }
body.edit-mode .fi-add-btn { display: flex; }

/* ── FORMAT TOOLBAR ──────────────────────────── */
.format-toolbar {
  display: none;
  align-items: center; gap: 3px;
  padding: 5px 8px;
  background: var(--blue);
  border-radius: 8px 8px 0 0;
  flex-wrap: wrap;
  flex-shrink: 0;
}
body.edit-mode .format-toolbar { display: flex; }
.ft-btn {
  height: 28px; min-width: 28px; padding: 0 7px;
  border: none; border-radius: 5px;
  background: rgba(255,255,255,.12);
  color: rgba(255,255,255,.85);
  font-family: 'DM Sans', sans-serif;
  font-size: 12px; font-weight: 600; cursor: pointer;
  transition: background .15s;
  display: flex; align-items: center; justify-content: center;
}
.ft-btn:hover { background: rgba(255,255,255,.28); }
.ft-btn.active { background: var(--gold); color: var(--blue); }
.ft-sep { width: 1px; height: 18px; background: rgba(255,255,255,.2); margin: 0 3px; }
.ft-select {
  height: 28px; padding: 0 6px;
  border: none; border-radius: 5px;
  background: rgba(255,255,255,.12);
  color: rgba(255,255,255,.85);
  font-family: 'DM Sans', sans-serif;
  font-size: 11px; cursor: pointer;
  outline: none;
}
.ft-select option { background: var(--blue); color: white; }
.ft-size-display {
  color: rgba(255,255,255,.7); font-size: 11px;
  min-width: 28px; text-align: center;
}

/* Editable content */
body.edit-mode .editable-content {
  border: 1.5px dashed rgba(247,168,27,.5);
  border-radius: 4px; padding: 4px 6px;
  cursor: text;
}
body.edit-mode .editable-content:focus {
  border-color: var(--gold);
  background: rgba(247,168,27,.04);
  box-shadow: 0 0 0 3px rgba(247,168,27,.12);
}
body:not(.edit-mode) .attachments:empty { display: none; }

/* ── NOTIFICATIONS ───────────────────────── */
#toast {
  position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(60px);
  background: var(--text); color: white;
  padding: 10px 20px; border-radius: 20px;
  font-size: 12px; font-weight: 500;
  z-index: 200; transition: transform .3s ease;
  white-space: nowrap; pointer-events: none;
}
#toast.show { transform: translateX(-50%) translateY(0); }

/* ── FULLSCREEN HINT ─────────────────────── */
#fs-hint {
  position: fixed; bottom: 18px; left: 22px;
  font-size: 10px; color: rgba(255,255,255,.3);
  z-index: 50; letter-spacing: .04em;
}

.bday-photo {
  object-fit: cover; border-radius: 50%;
  border: 2px solid var(--light);
}
.bday-soon {
  font-size: 11px; font-weight: 600; color: var(--blue);
  background: var(--offwht); border: 1px solid var(--light);
  padding: 2px 8px; border-radius: 10px; flex-shrink: 0;
  white-space: nowrap;
}
.bday-past-label {
  font-size: 11px; color: var(--muted);
  flex-shrink: 0; white-space: nowrap;
}
.bday-past { opacity: .6; }

/* Scrollbar */
.cs-card-inner::-webkit-scrollbar { width: 4px; }
.cs-card-inner::-webkit-scrollbar-track { background: transparent; }
.cs-card-inner::-webkit-scrollbar-thumb { background: var(--light); border-radius: 2px; }

/* ── PDF IMPORT MODAL ────────────────────── */
#import-modal {
  position: fixed; inset: 0; z-index: 300;
  background: rgba(0,10,30,.72);
  backdrop-filter: blur(6px);
  display: none; align-items: center; justify-content: center;
  padding: 20px;
}
#import-modal.open { display: flex; }
.modal-box {
  background: white; border-radius: 16px;
  width: min(680px, 100%); max-height: 85vh;
  display: flex; flex-direction: column;
  box-shadow: 0 24px 60px rgba(0,0,0,.35);
  overflow: hidden;
}
.modal-head {
  padding: 18px 24px 14px;
  border-bottom: 1px solid var(--light);
  display: flex; align-items: center; justify-content: space-between;
  flex-shrink: 0;
}
.modal-head h2 {
  font-size: 16px; font-weight: 600; color: var(--text);
}
.modal-close {
  width: 30px; height: 30px; border-radius: 50%;
  border: none; background: var(--light);
  cursor: pointer; font-size: 16px; color: var(--muted);
  display: flex; align-items: center; justify-content: center;
}
.modal-close:hover { background: #d0d7e8; }
.modal-body {
  flex: 1; overflow-y: auto; padding: 16px 24px;
  display: flex; flex-direction: column; gap: 12px;
}
.modal-section-label {
  font-size: 11px; font-weight: 600; letter-spacing: .1em;
  text-transform: uppercase; color: var(--muted);
  margin-bottom: 4px;
}
.raw-text-box {
  background: var(--offwht); border: 1px solid var(--light);
  border-radius: 8px; padding: 10px 12px;
  font-size: 11px; font-family: monospace;
  color: var(--text); white-space: pre-wrap;
  max-height: 130px; overflow-y: auto; line-height: 1.5;
}
.parsed-list {
  display: flex; flex-direction: column; gap: 4px;
  max-height: 240px; overflow-y: auto;
}
.parsed-item {
  display: flex; align-items: center; gap: 10px;
  padding: 6px 10px; border-radius: 6px;
  background: var(--offwht); font-size: 12px;
}
.parsed-item input[type=checkbox] { accent-color: var(--blue); flex-shrink: 0; }
.parsed-item .pi-name { flex: 1; font-weight: 500; color: var(--text); }
.parsed-item .pi-date { color: var(--muted); font-size: 11px; }
.parsed-item.unchecked { opacity: .45; }
.manual-entry-area {
  border: 1.5px dashed var(--light); border-radius: 8px;
  padding: 10px 12px; font-size: 12px;
  font-family: 'DM Sans', sans-serif; color: var(--text);
  resize: vertical; min-height: 80px; outline: none;
  transition: border-color .2s;
}
.manual-entry-area:focus { border-color: var(--gold); }
.modal-foot {
  padding: 12px 24px; border-top: 1px solid var(--light);
  display: flex; align-items: center; justify-content: space-between;
  gap: 10px; flex-shrink: 0;
}
.modal-count { font-size: 12px; color: var(--muted); }
.modal-btn {
  padding: 8px 20px; border-radius: 8px; border: none;
  font-family: 'DM Sans', sans-serif; font-size: 13px;
  font-weight: 500; cursor: pointer; transition: background .2s;
}
.modal-btn.primary { background: var(--blue); color: white; }
.modal-btn.primary:hover { background: var(--blue2); }
.modal-btn.secondary { background: var(--light); color: var(--text); }
.modal-btn.secondary:hover { background: #d0d7e8; }
.modal-btn.danger { background: #fdecea; color: #c0392b; }
.modal-btn.danger:hover { background: #f5c6c6; }

/* Event edit table */
.event-table {
  width: 100%; border-collapse: collapse; font-size: 12px;
}
.event-table th {
  text-align: left; padding: 6px 8px;
  font-size: 10px; font-weight: 600; letter-spacing: .09em;
  text-transform: uppercase; color: var(--muted);
  border-bottom: 2px solid var(--light); background: var(--offwht);
}
.event-table th:first-child { width: 32px; }
.event-table th.col-date  { width: 110px; }
.event-table th.col-time  { width: 76px; }
.event-table th.col-del   { width: 32px; }
.event-table td {
  padding: 4px 4px; border-bottom: 1px solid var(--light);
  vertical-align: middle;
}
.event-table tr:hover td { background: #fafbff; }
.et-input {
  width: 100%; border: 1px solid transparent; border-radius: 5px;
  padding: 4px 6px; font-size: 12px; font-family: 'DM Sans',sans-serif;
  color: var(--text); background: transparent; outline: none;
  transition: border-color .15s, background .15s;
}
.et-input:focus { border-color: var(--gold); background: #FFFBF0; }
.et-del {
  background: none; border: none; cursor: pointer;
  color: #ccc; font-size: 15px; padding: 2px 4px;
  border-radius: 4px; line-height: 1;
}
.et-del:hover { color: #c0392b; background: #fdecea; }
.add-row-btn {
  background: none; border: 1px dashed var(--light);
  border-radius: 6px; padding: 6px 12px;
  font-size: 11px; color: var(--muted); cursor: pointer;
  width: 100%; text-align: center; margin-top: 6px;
  font-family: 'DM Sans',sans-serif;
  transition: border-color .15s, color .15s;
}
.add-row-btn:hover { border-color: var(--gold); color: var(--blue); }

/* ── EMAIL SUMMARY SECTION ───────────────── */
.email-summary-section {
  border: 1px solid var(--light); border-radius: 10px;
  background: #F4F8FF; padding: 12px clamp(14px,2vw,20px);
  margin-bottom: clamp(10px,1.6vh,16px);
}
.email-summary-header {
  display: flex; align-items: center; justify-content: space-between;
  flex-wrap: wrap; gap: 8px;
}
.email-summary-title {
  font-weight: 600; font-size: clamp(13px,1.4vw,18px); color: var(--blue);
}
.email-input-controls { display: none; gap: 8px; }
body.edit-mode .email-input-controls { display: flex; }
.email-card {
  background: white; border: 1px solid var(--light); border-radius: 8px;
  padding: 10px 14px; margin-top: 10px; position: relative;
}
.email-card .ec-subject {
  font-weight: 600; color: var(--text);
  font-size: clamp(13px,1.3vw,17px); padding-right: 24px;
}
.email-card .ec-from {
  font-size: clamp(11px,1vw,13px); color: var(--muted); margin: 2px 0 6px;
}
.email-card .ec-summary {
  font-size: clamp(13px,1.2vw,16px); color: var(--text); line-height: 1.55;
}
.email-card .ec-del {
  position: absolute; top: 8px; right: 10px;
  background: none; border: none; color: var(--muted);
  cursor: pointer; font-size: 14px; padding: 2px 6px; border-radius: 4px;
}
.email-card .ec-del:hover { color: #c0392b; background: #fdecea; }
body:not(.edit-mode) .email-card .ec-del { display: none; }
.email-loading {
  font-size: 12px; color: var(--muted); padding: 8px 0;
  display: flex; align-items: center; gap: 6px;
}
.email-loading::before {
  content: ''; width: 13px; height: 13px; border-radius: 50%;
  border: 2px solid var(--light); border-top-color: var(--blue);
  animation: spin .7s linear infinite; flex-shrink: 0;
}

  display: flex; align-items: center; gap: 8px;
  color: var(--muted); font-size: 12px; padding: 20px 0;
}
.parsing-spinner::before {
  content: ''; width: 16px; height: 16px; border-radius: 50%;
  border: 2px solid var(--light); border-top-color: var(--blue);
  animation: spin .7s linear infinite; flex-shrink: 0;
}
@keyframes spin { to { transform: rotate(360deg); } }

.csv-import-btn {
  display: none;
  align-items: center; gap: 6px;
  background: var(--blue); color: white;
  border: none; border-radius: 8px;
  padding: 7px 14px; font-size: 12px;
  font-family: 'DM Sans', sans-serif; font-weight: 500;
  cursor: pointer; transition: background .2s;
  flex-shrink: 0;
}
.csv-import-btn:hover { background: var(--blue2); }
.csv-import-btn svg { width: 14px; height: 14px; }
body.edit-mode .csv-import-btn { display: flex; }

/* ── DATA SLIDES (Geburtstage + Termine) ─── */
.data-card {
  flex: 1; background: white;
  border-radius: var(--r); border: 1px solid var(--light);
  box-shadow: var(--shadow); overflow: hidden;
  display: flex; flex-direction: column;
}
.data-header-row {
  display: flex; align-items: center;
  justify-content: space-between;
  padding: 0 clamp(14px,2vw,22px);
  flex-shrink: 0;
}
.data-list {
  flex: 1; overflow-y: auto;
  padding: clamp(6px,1vh,12px) clamp(14px,2vw,22px);
  display: flex; flex-direction: column; gap: 5px;
  position: relative;
}
.data-list::-webkit-scrollbar { width: 4px; }
.data-list::-webkit-scrollbar-thumb { background: var(--light); border-radius: 2px; }

/* Birthday item */
.bday-item {
  display: flex; align-items: center; gap: 12px;
  padding: 7px 12px; border-radius: 8px;
  border: 1px solid transparent;
  transition: background .15s;
}
.bday-item.this-month {
  background: #FFFBF0; border-color: rgba(247,168,27,.3);
}
.bday-item.today {
  background: #FFF3D0; border-color: var(--gold);
}
.bday-avatar {
  width: 44px; height: 44px; border-radius: 50%;
  background: var(--blue); color: white;
  display: flex; align-items: center; justify-content: center;
  font-size: 16px; font-weight: 600; flex-shrink: 0;
}
.bday-item.this-month .bday-avatar { background: var(--gold); color: var(--blue); }
.bday-item.today .bday-avatar { background: #E67E22; color: white; }
.bday-name { font-size: clamp(15px,1.7vw,22px); font-weight: 600; color: var(--text); }
.bday-date { font-size: clamp(12px,1.2vw,16px); color: var(--muted); margin-top: 2px; }
.bday-badge {
  margin-left: auto; font-size: clamp(11px,1vw,14px); font-weight: 700;
  padding: 4px 12px; border-radius: 10px;
  background: var(--gold); color: var(--blue);
  flex-shrink: 0;
}
.bday-age {
  font-size: 10px; color: var(--muted);
  margin-left: auto; flex-shrink: 0;
}

/* Section label in data list */
.data-section-label {
  font-size: clamp(11px,.95vw,14px); font-weight: 600; letter-spacing: .1em;
  text-transform: uppercase; color: var(--muted);
  padding: 6px 0 2px; border-bottom: 1px solid var(--light);
  margin-bottom: 2px;
}

/* Event item */
.event-item {
  display: flex; gap: 14px; align-items: flex-start;
  padding: 8px 12px; border-radius: 8px;
  border: 1px solid transparent; transition: background .15s;
}
.event-item:hover { background: var(--offwht); }
.event-item.upcoming { border-color: rgba(0,63,135,.12); background: #F0F5FF; }
.event-date-block {
  flex-shrink: 0; width: 58px; text-align: center;
  background: var(--blue); color: white;
  border-radius: 8px; padding: 5px 4px;
}
.event-date-block .eday { font-size: clamp(20px,2.2vw,28px); font-weight: 700; line-height: 1; }
.event-date-block .emon { font-size: clamp(10px,.9vw,12px); text-transform: uppercase; letter-spacing: .06em; opacity: .85; }
.event-item.upcoming .event-date-block { background: var(--gold); color: var(--blue); }
.event-item[style*="opacity:.45"] .event-date-block { background: var(--muted); }
.event-info { flex: 1; min-width: 0; }
.event-title { font-size: clamp(15px,1.7vw,22px); font-weight: 500; color: var(--text); }
.event-meta { font-size: clamp(12px,1.1vw,15px); color: var(--muted); margin-top: 3px; }
.event-thema { font-size: clamp(12px,1.1vw,15px); color: var(--blue); margin-top: 2px; font-weight: 500; }

/* Empty state */
.empty-state {
  flex: 1; display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  color: var(--muted); gap: 8px; padding: 20px;
}
.empty-state svg { width: 36px; height: 36px; opacity: .35; }
.empty-state p { font-size: 12px; text-align: center; line-height: 1.5; }
.empty-state .hint { font-size: 11px; opacity: .7; }

/* Watermark in data slides */
.data-watermark {
  position: absolute; right: -3%; bottom: -6%;
  width: 38%; opacity: .04; pointer-events: none;
}
</style>
</head>

async function extractPDFText(file) {
  const buf = await file.arrayBuffer();
  const pdf = await pdfjsLib.getDocument({ data: buf }).promise;
  const allLines = [];

  for (let p = 1; p <= pdf.numPages; p++) {
    const page    = await pdf.getPage(p);
    const content = await page.getTextContent();

    // Group text items by y-coordinate (±3pt tolerance = same row)
    const rows = [];
    content.items.forEach(item => {
      if (!item.str.trim()) return;
      const y = item.transform[5]; // baseline y in PDF units
      const x = item.transform[4];
      let row = rows.find(r => Math.abs(r.y - y) < 3);
      if (!row) { row = { y, items: [] }; rows.push(row); }
      row.items.push({ x, str: item.str });
    });

    // Sort rows top-to-bottom (higher y = higher on page in PDF coords)
    rows.sort((a, b) => b.y - a.y);

    // Within each row: sort left-to-right, join with space
    rows.forEach(row => {
      row.items.sort((a, b) => a.x - b.x);
      const line = row.items.map(i => i.str).join(' ').trim();
      if (line) allLines.push(line);
    });
  }

  return allLines.join('\n');
}

  return pdfjsLib.getDocument({ data: buf }).promise;
}

// ── MEMBER PDF PARSER (MyRotary Mitglieder Übersicht) ─────────
function parseMemberPDF(text) {
  // Rejoin single-char line-overflow (e.g. "Petschauer-Thiemi\ng")
  const rawLines = text.split('\n');
  const lines = [];
  rawLines.forEach(l => {
    const t = l.trim();
    if (!t) return;
    if (/^[a-z\u00e4\u00f6\u00fc\u00df]{1,4}$/.test(t) && lines.length)
      lines[lines.length - 1] += t;  // rejoin overflow char
    else lines.push(t);
  });

  const members = [], seen = new Set();

  lines.forEach(line => {
    // Skip header and footer lines
    if (/Nachname|Vorname|Geburts-Datum|Zugeh/i.test(line)) return;
    if (/Mitglieder.*bersicht|\d+\s*\/\s*\d+/i.test(line)) return;

    // Find the birth date
    const dm = line.match(/(\d{2}\.\d{2}\.\d{4})/);
    if (!dm) return;
    const d = parseDate(dm[1]);
    if (!d) return;

    // Text before date: "Nachname Vorname [any titles...]"
    // Strategy: take ONLY the first two words — that is always Nachname + Vorname
    // Academic titles appear AFTER the Vorname, we simply ignore them
    const before = line.slice(0, line.indexOf(dm[1]))
      .replace(/\bFoto\b|\bAktivmitglied\b/gi, '')
      .trim();

    const words = before.split(/\s+/).filter(Boolean);
    if (words.length < 2) return;

    // Handle hyphenated surname split across PDF lines:
    // "Brade-Schwegler" arrives as ["Brade-", "Schwegler", "Dorit"]
    // → merge trailing-hyphen word with the next one
    let wi = 0;
    let nachname = words[wi++];
    while (nachname.endsWith('-') && wi < words.length) {
      nachname += words[wi++];
    }
    if (wi >= words.length) return; // no Vorname left
    let vorname = words[wi];

    nachname = nachname.replace(/[,.]$/, '');
    vorname  = vorname.replace(/[,.]$/, '');

    // Sanity: both must look like real name parts (uppercase start, ≥2 chars)
    if (!/^[A-Z\u00c4\u00d6\u00dc][a-z\u00e4\u00f6\u00fc\u00df-]/.test(nachname)) return;
    if (!/^[A-Z\u00c4\u00d6\u00dc][a-z\u00e4\u00f6\u00fc\u00df-]/.test(vorname))  return;

    const name = vorname + ' ' + nachname;
    const key  = name + dm[1];
    if (seen.has(key)) return;
    seen.add(key);

    members.push({
      name, nachname, vorname,
      initials: (vorname[0] + nachname[0]).toUpperCase(),
      ...d, photo: null
    });
  });

  return members.sort((a,b) => a.month !== b.month ? a.month-b.month : a.day-b.day);
}


// ── PHOTO EXTRACTOR via PDF canvas rendering ──────────────────
async function extractPhotosFromPDF(pdfDoc, members) {
  const byDate = {};

  for (let pn = 1; pn <= pdfDoc.numPages; pn++) {
    const page  = await pdfDoc.getPage(pn);
    const scale = 3;                                // higher = sharper photos
    const vp    = page.getViewport({ scale });

    const canvas = document.createElement('canvas');
    canvas.width = vp.width; canvas.height = vp.height;
    await page.render({ canvasContext: canvas.getContext('2d'), viewport: vp }).promise;
    const ctx = canvas.getContext('2d');

    const tc = await page.getTextContent();

    // Collect all date items with Y positions, sorted top→bottom
    const dateItems = tc.items
      .filter(i => /^\d{2}\.\d{2}\.\d{4}$/.test(i.str.trim()))
      .map(i => ({ str: i.str.trim(), pdfY: i.transform[5] }))
      .sort((a, b) => b.pdfY - a.pdfY);

    if (!dateItems.length) continue;

    // Calculate row height from Y gaps between adjacent dates
    let rowPt = 26;
    if (dateItems.length >= 2) {
      const gaps = [];
      for (let i = 0; i < dateItems.length - 1; i++)
        gaps.push(Math.abs(dateItems[i].pdfY - dateItems[i+1].pdfY));
      const sorted = [...gaps].filter(g => g > 5 && g < 50).sort((a,b) => a-b);
      if (sorted.length) rowPt = sorted[Math.floor(sorted.length / 2)];
    }

    const pdfH = vp.height / scale;

    dateItems.forEach(({ str, pdfY }) => {
      const baselineY = (pdfH - pdfY) * scale; // canvas Y of text baseline

      // Photo is ABOVE the text baseline, in the left "Foto" column
      // Try multiple vertical offsets to find best photo crop
      const rowH    = rowPt * scale;
      const photoW  = Math.round(52 * scale);  // Foto column ~52pt wide
      const photoH  = Math.round(rowPt * 0.88 * scale);

      // Scan vertical offsets: photo could be anywhere from baseline upward
      const offsets = [0.92, 0.75, 1.05, 0.60]; // fraction of rowH above baseline
      let bestCrop = null, bestDark = 0;

      for (const off of offsets) {
        const py = Math.round(baselineY - rowH * off);
        if (py < 0 || py + photoH > canvas.height) continue;

        const imgData = ctx.getImageData(8, py, photoW, photoH).data;
        let dark = 0;
        for (let i = 0; i < imgData.length; i += 4)
          if ((imgData[i] + imgData[i+1] + imgData[i+2]) / 3 < 210) dark++;

        if (dark > bestDark) { bestDark = dark; bestCrop = py; }
      }

      // Need at least 5% non-white pixels
      if (!bestCrop || bestDark / (photoW * photoH) < 0.05) return;

      const thumb = document.createElement('canvas');
      thumb.width = thumb.height = 64;
      const tc2 = thumb.getContext('2d');
      tc2.fillStyle = '#dce5f4';
      tc2.fillRect(0, 0, 64, 64);
      tc2.drawImage(canvas, 8, bestCrop, photoW, photoH, 0, 0, 64, 64);

      byDate[str] = thumb.toDataURL('image/jpeg', 0.88);
    });
  }

  members.forEach(m => {
    const k = `${String(m.day).padStart(2,'0')}.${String(m.month).padStart(2,'0')}.${m.year}`;
    if (byDate[k]) m.photo = byDate[k];
  });
  return members;
}

// ── BIRTHDAY EXTRACTOR ───────────────────────────────────────
function extractBirthdays(text) {
  // Detect MyRotary Mitglieder Übersicht format
  if (text.includes('Geburts-Datum') || (text.includes('Nachname') && text.includes('Vorname') && text.includes('Aktivmitglied'))) {
    return parseMemberPDF(text);
  }
  // Generic fallback: scan for Name + DD.MM.YYYY patterns
  const results = [], seen = new Set();
  const lines = text.split(/\n/).map(l => l.trim()).filter(Boolean);
  const monthMap = {jan:1,feb:2,'mär':3,mar:3,apr:4,mai:5,may:5,jun:6,jul:7,aug:8,sep:9,okt:10,oct:10,nov:11,dez:12,dec:12};
  lines.forEach(line => {
    const dm = line.match(/(\d{2}\.\d{2}\.\d{4})/);
    if (!dm) return;
    const d = parseDate(dm[1]);
    if (!d) return;
    const before = line.slice(0, line.indexOf(dm[1])).trim();
    const words  = before.split(/\s+/).filter(Boolean);
    if (words.length < 2) return;
    const nachname = words[0].replace(/[,.]$/,'');
    const vorname  = words[1].replace(/[,.]$/,'');
    if (!/^[A-ZÄÖÜ]/.test(nachname) || !/^[A-ZÄÖÜ]/.test(vorname)) return;
    const name = `${vorname} ${nachname}`;
    const key  = name + dm[1];
    if (seen.has(key)) return;
    seen.add(key);
    results.push({ name, nachname, vorname, initials:`${vorname[0]}${nachname[0]}`.toUpperCase(), ...d, photo:null });
  });
  return results.sort((a,b) => a.month !== b.month ? a.month-b.month : a.day-b.day);
}

// ── DATE STRING PARSER ───────────────────────────────────────
// Supports: DD.MM.YYYY, DD/MM/YYYY, YYYY-MM-DD, DD. Monat YYYY, DD. Monat
function parseDate(str) {
  if (!str) return null;
  str = str.trim();
  let m;
  // DD.MM.YYYY or DD.MM.YY
  if ((m = str.match(/^(\d{1,2})[.\/-](\d{1,2})[.\/-](\d{2,4})$/)))
    return { day:+m[1], month:+m[2], year: m[3].length===2 ? 2000+parseInt(m[3]) : +m[3] };
  // YYYY-MM-DD
  if ((m = str.match(/^(\d{4})-(\d{2})-(\d{2})$/)))
    return { day:+m[3], month:+m[2], year:+m[1] };
  // DD. Monat YYYY  or  DD. Monat
  const monthMap = {jan:1,feb:2,'mär':3,mar:3,apr:4,mai:5,may:5,jun:6,jul:7,aug:8,sep:9,okt:10,oct:10,nov:11,dez:12,dec:12};
  if ((m = str.match(/^(\d{1,2})\.\s*([A-Za-z\u00e4\u00f6\u00fc]+)\.?\s*(\d{4})?$/))) {
    const mon = monthMap[m[2].toLowerCase().slice(0,3)];
    if (mon) return { day:+m[1], month:mon, year: m[3] ? +m[3] : 0 };
  }
  return null;
}

// ── EVENT EXTRACTOR ───────────────────────────────────────────
// ── PDF ITEM EXTRACTOR (with x/y positions, for column-based parsing) ──
async function extractPDFItemsByPage(file) {
  const buf = await file.arrayBuffer();
  const pdf = await pdfjsLib.getDocument({ data: buf }).promise;
  const pages = [];
  for (let p = 1; p <= pdf.numPages; p++) {
    const page = await pdf.getPage(p);
    const content = await page.getTextContent();
    const items = content.items
      .map(i => ({ x0: i.transform[4], y0: i.transform[5], str: i.str.replace(/\u00a0/g, ' ').trim() }))
      .filter(i => i.str);
    pages.push(items);
  }
  return pages;
}

function extractEvents(text) {
  // Used only for the generic fallback path (non-MyRotary PDFs)
  if (text.includes('Termin-Übersicht') || text.includes('Datum Uhrzeit Ort Thema')) {
    return null; // signal: caller should use the column-based parser instead
  }
  return extractEventsGeneric(text);
}

// ── SPECIALIZED PARSER: MyRotary Termin-Übersicht (column/position based) ──
// Uses real x/y coordinates from the PDF so multi-line cells (e.g. "Sonderveran"
// + "staltung" wrapping across lines) never bleed into neighboring columns.
// Column x-ranges measured from the actual MyRotary export layout (in pt):
//   Ort   ≈ 139.5   Thema ≈ 233.3   Kat. ≈ 389.7   Referent/Protokollant/Leitung further right
function parseRotaryTerminPDFColumns(pages) {
  // Column x-ranges (pt) measured from the actual MyRotary export layout.
  // pdf.js gives Datum and Uhrzeit as TWO SEPARATE text items (unlike some
  // other extractors that merge them) — so we match them by shared y0.
  const DATUM_MIN = 20,  DATUM_MAX = 76;    // "01.07.2026"
  const UHRZEIT_MIN = 76, UHRZEIT_MAX = 130; // "18:00 - 21:00"
  const ORT_MIN = 130,    ORT_MAX = 226;     // Ort column
  const THEMA_MIN = 226,  THEMA_MAX = 387;   // Thema column (before Kat. ~389.7)
  const FOOTER_Y_GUARD = 40;                 // page footer / page-number text sits below this

  const STRIP_NOTES = [
    /\s*,?\s+weitere\s+Infos?\s+folgen.*/gi,
    /\s*-\s+weitere.*/gi,
    /\s+m[oö]glicherweise.*/gi,
    /,?\s+Näheres\s+folgt.*/gi,
  ];
  const PLACEHOLDER_ORT = /^(Infos\s+folgen|genaue\s+Zeit\s+und\s+Ort\s+folgen)$/i;

  const results = [];

  pages.forEach(items => {
    // Drop footer/page-number text so it can never leak into the last row's window
    const usable = items.filter(it => it.y0 > FOOTER_Y_GUARD);

    // Datum and Uhrzeit are separate items — pair them up by matching y0
    const datumItems = usable.filter(it =>
      it.x0 >= DATUM_MIN && it.x0 < DATUM_MAX && /^\d{2}\.\d{2}\.\d{4}$/.test(it.str));
    const uhrzeitItems = usable.filter(it =>
      it.x0 >= UHRZEIT_MIN && it.x0 < UHRZEIT_MAX && /^\d{2}:\d{2}\s*-\s*\d{2}:\d{2}$/.test(it.str));

    const dateRows = [];
    datumItems.forEach(di => {
      const ti = uhrzeitItems.find(t => Math.abs(t.y0 - di.y0) < 1.5);
      if (!ti) return;
      const tm = ti.str.match(/^(\d{2}:\d{2})\s*-\s*(\d{2}:\d{2})$/);
      if (!tm) return;
      dateRows.push({ y0: di.y0, date: di.str, timeStart: tm[1], timeEnd: tm[2] });
    });
    dateRows.sort((a, b) => b.y0 - a.y0); // top → bottom

    dateRows.forEach((row, i) => {
      const yTop = row.y0 + 0.5;
      const yBottom = i + 1 < dateRows.length ? dateRows[i+1].y0 : 0;

      const inWindow = usable.filter(it => it.y0 <= yTop && it.y0 > yBottom);

      const ortParts = inWindow
        .filter(it => it.x0 >= ORT_MIN && it.x0 < ORT_MAX)
        .sort((a,b) => b.y0 - a.y0).map(it => it.str);
      const themaParts = inWindow
        .filter(it => it.x0 >= THEMA_MIN && it.x0 < THEMA_MAX)
        .sort((a,b) => b.y0 - a.y0).map(it => it.str);

      let loc = ortParts.join(' ').replace(/\s{2,}/g, ' ').trim();
      let title = themaParts.join(' ').replace(/\s{2,}/g, ' ').trim();

      for (const rx of STRIP_NOTES) title = title.replace(rx, '');
      title = title.replace(/[-,;]\s*$/, '').trim();

      if (PLACEHOLDER_ORT.test(loc)) loc = '';

      if (!title) return;
      const d = parseDate(row.date);
      if (!d) return;

      results.push({
        title, ...d,
        timeStart: row.timeStart,
        timeEnd: row.timeEnd,
        time: `${row.timeStart} – ${row.timeEnd}`,
        loc
      });
    });
  });

  return results.sort((a,b) => new Date(a.year,a.month-1,a.day) - new Date(b.year,b.month-1,b.day));
}

// ── GENERIC FALLBACK EXTRACTOR ────────────────────────────────
function extractEventsGeneric(text) {
  const results = [];
  const seen = new Set();
  const lines = text.split(/\n/).map(l => l.trim()).filter(Boolean);
  const monthNames = 'Januar|Februar|März|Maerz|April|Mai|Juni|Juli|August|September|Oktober|November|Dezember';
  const monthMap = {januar:1,februar:2,'märz':3,maerz:3,april:4,mai:5,juni:6,juli:7,august:8,september:9,oktober:10,november:11,dezember:12};

  lines.forEach(line => {
    const rA = new RegExp(`(\\d{1,2})[.\\s]+(${monthNames})\\.?\\s*(\\d{4})?\\s*(\\d{1,2}[.:h]\\d{2})?\\s*Uhr?\\s*(.+)?`, 'i');
    const rB = /(\d{1,2})\.(\d{1,2})\.(\d{4})\s*(?:(\d{1,2}[.:h]\d{2})\s*Uhr?)?\s*(.+)?/i;
    const rC = /^(.+?)\s+(\d{1,2})\.(\d{1,2})\.(\d{4})/i;
    let m;
    if ((m = rA.exec(line))) {
      const mon = monthMap[m[2].toLowerCase()];
      const title = m[5]?.trim();
      if (mon && title?.length > 2) {
        const key = `${m[1]}_${mon}_${m[3]||''}`;
        if (!seen.has(key)) { seen.add(key); results.push({ title, day:+m[1], month:mon, year:m[3]?+m[3]:now.getFullYear(), time:m[4]||'', loc:'' }); }
      }
    } else if ((m = rB.exec(line))) {
      const title = m[5]?.trim();
      if (title?.length > 2) {
        const key = `${m[1]}_${m[2]}_${m[3]}`;
        if (!seen.has(key)) { seen.add(key); results.push({ title, day:+m[1], month:+m[2], year:+m[3], time:m[4]||'', loc:'' }); }
      }
    } else if ((m = rC.exec(line))) {
      const key = `${m[2]}_${m[3]}_${m[4]}`;
      if (!seen.has(key)) { seen.add(key); results.push({ title:m[1].trim(), day:+m[2], month:+m[3], year:+m[4], time:'', loc:'' }); }
    }
  });
  return results.sort((a,b) => new Date(a.year,a.month-1,a.day) - new Date(b.year,b.month-1,b.day));
}

// Open modal, parse PDF
async function openPDFImport(file, mode) {
  modalMode = mode;
  const modal = document.getElementById('import-modal');
  const body  = document.getElementById('modal-body');
  document.getElementById('modal-title').textContent =
    mode === 'birthdays' ? '🎂 Geburtstage aus PDF importieren' : '📅 Termine aus PDF importieren';
  document.getElementById('modal-confirm').disabled = true;
  body.innerHTML = '<div class="parsing-spinner">PDF wird gelesen…</div>';
  modal.classList.add('open');

  try {
    body.innerHTML = '<div class="parsing-spinner">PDF wird gelesen…</div>';
    const rawText = await extractPDFText(file);
    let parsed;

    if (mode === 'birthdays') {
      parsed = extractBirthdays(rawText);
      // For member list PDFs: also extract photos
      if (rawText.includes('Geburts-Datum')) {
        body.innerHTML = '<div class="parsing-spinner">Fotos werden extrahiert…</div>';
        try {
          const pdfDoc = await loadPDFDoc(file);
          parsed = await extractPhotosFromPDF(pdfDoc, parsed);
        } catch(photoErr) {
          console.warn('Photo extraction failed:', photoErr);
        }
      }
    } else {
      // mode === 'events'
      if (rawText.includes('Termin-Übersicht') || rawText.includes('Datum Uhrzeit Ort Thema')) {
        // MyRotary format → use precise column/position-based parser
        body.innerHTML = '<div class="parsing-spinner">Termine werden zugeordnet…</div>';
        const pagesItems = await extractPDFItemsByPage(file);
        parsed = parseRotaryTerminPDFColumns(pagesItems);
      } else {
        parsed = extractEventsGeneric(rawText);
      }
    }

    pendingItems = parsed;
    renderModalContent(rawText, parsed, mode);
  } catch(e) {
    document.getElementById('modal-body').innerHTML = `
      <p style="color:#c0392b;font-size:13px">Fehler beim Lesen des PDFs: ${e.message}</p>
      <p style="font-size:12px;color:var(--muted);margin-top:8px">Bitte prüfe ob das PDF nicht passwortgeschützt ist.</p>`;
  }
}

function renderModalContent(rawText, parsed, mode) {
  const body   = document.getElementById('modal-body');
  const isBday = mode === 'birthdays';

  if (isBday) {
    // Birthdays: keep the original checkbox list
    const itemsHTML = parsed.length
      ? parsed.map((item, i) => {
          const dateStr = `${item.day}. ${MONTHS[item.month-1]}${item.year?' '+item.year:''}`;
          return `<label class="parsed-item" id="pi-${i}">
            <input type="checkbox" checked onchange="toggleItem(${i},this)">
            <span class="pi-name">${item.name}</span>
            <span class="pi-date">${dateStr}</span>
          </label>`;
        }).join('')
      : `<p style="font-size:12px;color:var(--muted);padding:8px 0">Keine Geburtstage erkannt.</p>`;

    body.innerHTML = `
      <div>
        <div class="modal-section-label">PDF-Rohtext (Auszug)</div>
        <div class="raw-text-box">${rawText.slice(0,600).replace(/</g,'&lt;')}${rawText.length>600?'\n…':''}</div>
      </div>
      <div>
        <div class="modal-section-label">Erkannte Geburtstage (${parsed.length})</div>
        <div class="parsed-list" id="bday-checklist">${itemsHTML}</div>
      </div>
      <div>
        <div class="modal-section-label">Manuell ergänzen</div>
        <textarea class="manual-entry-area" id="manual-entries"
          placeholder="Max Mustermann · 15. März 1965&#10;Erika Muster · 3. Juli"></textarea>
      </div>`;

  } else {
    // Events: editable table with only Datum, Uhrzeit, Veranstaltung
    body.innerHTML = `
      <div>
        <div class="modal-section-label">PDF-Rohtext (Auszug)</div>
        <div class="raw-text-box">${rawText.slice(0,500).replace(/</g,'&lt;')}${rawText.length>500?'\n…':''}</div>
      </div>
      <div>
        <div class="modal-section-label" style="margin-bottom:8px">
          Termine bearbeiten — nicht benötigte Zeilen löschen mit ✕
        </div>
        <div style="overflow-x:auto">
          <table class="event-table" id="event-table">
            <thead>
              <tr>
                <th></th>
                <th class="col-date">Datum</th>
                <th class="col-time">Uhrzeit</th>
                <th>Veranstaltungsname</th>
                <th>Thema</th>
                <th class="col-del"></th>
              </tr>
            </thead>
            <tbody id="event-tbody">
              ${parsed.map((e,i) => eventRowHTML(e, i)).join('')}
            </tbody>
          </table>
        </div>
        <button class="add-row-btn" onclick="addEventRow()">+ Zeile hinzufügen</button>
      </div>`;
  }

  updateModalCount();
  document.getElementById('modal-confirm').disabled = false;
}

let rowCounter = 0;

function eventRowHTML(e, i) {
  const dateStr = `${String(e.day).padStart(2,'0')}.${String(e.month).padStart(2,'0')}.${e.year||now.getFullYear()}`;
  const timeStr = e.time || (e.timeStart ? `${e.timeStart} – ${e.timeEnd}` : '');
  const loc = (e.loc || '').replace(/"/g, '&quot;');
  const thema = (e.thema !== undefined ? e.thema : e.title) || '';
  rowCounter = Math.max(rowCounter, i + 1);
  return `<tr id="erow-${i}" data-loc="${loc}">
    <td style="text-align:center;color:var(--muted);font-size:11px">${i+1}</td>
    <td><input class="et-input" value="${dateStr}" placeholder="TT.MM.JJJJ" id="edate-${i}"/></td>
    <td><input class="et-input" value="${timeStr}" placeholder="19:00 – 21:00" id="etime-${i}" style="min-width:110px"/></td>
    <td>
      <input class="et-input" value="${e.title}" placeholder="Veranstaltungsname" id="etitle-${i}" style="min-width:160px"/>
      ${loc ? `<div style="font-size:10.5px;color:var(--muted);padding:2px 6px 0">📍 ${loc}</div>` : ''}
    </td>
    <td><input class="et-input" value="${thema}" placeholder="Thema" id="ethema-${i}" style="min-width:160px"/></td>
    <td><button class="et-del" onclick="deleteEventRow(${i})" title="Zeile löschen">✕</button></td>
  </tr>`;
}

function addEventRow() {
  const tbody = document.getElementById('event-tbody');
  if (!tbody) return;
  const i = rowCounter++;
  const row = document.createElement('tr');
  row.id = `erow-${i}`;
  row.innerHTML = `
    <td style="text-align:center;color:var(--muted);font-size:11px">${i+1}</td>
    <td><input class="et-input" value="" placeholder="TT.MM.JJJJ" id="edate-${i}"/></td>
    <td><input class="et-input" value="" placeholder="19:00" id="etime-${i}"/></td>
    <td><input class="et-input" value="" placeholder="Veranstaltungsname" id="etitle-${i}" style="min-width:160px"/></td>
    <td><input class="et-input" value="" placeholder="Thema" id="ethema-${i}" style="min-width:160px"/></td>
    <td><button class="et-del" onclick="deleteEventRow(${i})" title="Zeile löschen">✕</button></td>`;
  tbody.appendChild(row);
  row.querySelector('.et-input').focus();
  updateModalCount();
}

function deleteEventRow(i) {
  const row = document.getElementById('erow-'+i);
  if (row) { row.remove(); updateModalCount(); }
}

function toggleItem(i, cb) {
  pendingItems[i]._excluded = !cb.checked;
  document.getElementById('pi-'+i)?.classList.toggle('unchecked', !cb.checked);
  updateModalCount();
}

function updateModalCount() {
  let count = 0;
  if (modalMode === 'birthdays') {
    count = pendingItems.filter(i => !i._excluded).length;
    const manual = document.getElementById('manual-entries')?.value.trim();
    if (manual) count += manual.split('\n').filter(l=>l.trim()).length;
  } else {
    count = document.querySelectorAll('#event-tbody tr').length;
  }
  document.getElementById('modal-count').textContent =
    `${count} Einträge werden importiert`;
}

function confirmImport() {
  if (modalMode === 'birthdays') {
    // Collect checked items + manual entries
    const manualText = document.getElementById('manual-entries')?.value || '';
    const manual = manualText.trim().split('\n').flatMap(line => {
      line = line.trim(); if (!line) return [];
      const parts = line.split(/[·|]/).map(p=>p.trim());
      if (parts.length < 2) return [];
      const d = parseDate(parts[1]);
      return d ? [{ name: parts[0], ...d }] : [];
    });
    const confirmed = pendingItems.filter(i => !i._excluded).concat(manual);
    if (!confirmed.length) { toast('Keine Einträge ausgewählt'); return; }
    data.birthdays = confirmed;
    saveData();
    const el = document.getElementById('bday-list');
    if (el) el.innerHTML = renderBirthdays(confirmed) +
      `<div class="data-watermark">${wheelSvg('currentColor','100%')}</div>`;
    toast(`✓ ${confirmed.length} Geburtstage importiert`);

  } else {
    // Collect all table rows
    const rows = document.querySelectorAll('#event-tbody tr');
    const confirmed = [];
    rows.forEach(row => {
      const id    = row.id.replace('erow-','');
      const dateV = document.getElementById('edate-'+id)?.value.trim()  || '';
      const timeV = document.getElementById('etime-'+id)?.value.trim()  || '';
      const title = document.getElementById('etitle-'+id)?.value.trim() || '';
      const thema = document.getElementById('ethema-'+id)?.value.trim() || '';
      const loc   = row.dataset.loc || '';
      if (!title) return;
      const d = parseDate(dateV);
      if (d) confirmed.push({ title, thema, ...d, time: timeV, loc });
      else if (title) confirmed.push({ title, thema, day:1, month:1, year:now.getFullYear(), time:timeV, loc });
    });
    if (!confirmed.length) { toast('Keine Termine eingetragen'); return; }
    data.events = confirmed.sort((a,b) => new Date(a.year,a.month-1,a.day) - new Date(b.year,b.month-1,b.day));
    saveData();
    const el = document.getElementById('events-list');
    if (el) el.innerHTML = renderEvents(data.events) +
      `<div class="data-watermark">${wheelSvg('currentColor','100%')}</div>`;
    toast(`✓ ${confirmed.length} Termine importiert`);
  }
  closeModal();
}

function closeModal() {
  document.getElementById('import-modal').classList.remove('open');
  pendingItems = []; modalMode = null; rowCounter = 0;
}


// ── ±14-DAY BIRTHDAY WINDOW ───────────────────────────────────
function daysUntilBirthday(day, month) {
  const today = new Date(); today.setHours(0,0,0,0);
  const yr = today.getFullYear();
  let bday = new Date(yr, month-1, day);
  let diff = Math.round((bday - today) / 86400000);
  if (diff < -14) { bday = new Date(yr+1, month-1, day); diff = Math.round((bday - today) / 86400000); }
  return diff;
}

// ── BIRTHDAY DISPLAY (±14 day window, with photos) ────────────
function renderBirthdays(list) {
  if (!list || list.length === 0) {
    return `<div class="empty-state">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/>
      </svg>
      <p>Noch keine Geburtstagsliste importiert.</p>
      <span class="hint">Im Bearbeitungsmodus PDF importieren.</span>
    </div>`;
  }

  // Calculate days until/since each birthday and filter ±14 days
  const windowed = list
    .map(b => ({ ...b, diff: daysUntilBirthday(b.day, b.month) }))
    .filter(b => b.diff >= -14 && b.diff <= 14)
    .sort((a,b) => a.diff - b.diff);

  if (!windowed.length) {
    // No birthdays in window — show next upcoming birthday
    const upcoming = list
      .map(b => ({ ...b, diff: daysUntilBirthday(b.day, b.month) }))
      .filter(b => b.diff > 0)
      .sort((a,b) => a.diff - b.diff);
    const next = upcoming[0];
    return `<div class="empty-state">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/>
      </svg>
      <p>Keine Geburtstage in den nächsten/letzten 14 Tagen.</p>
      ${next ? `<span class="hint">Nächster: ${next.name} in ${next.diff} Tagen (${next.day}. ${MONTHS[next.month-1]})</span>` : ''}
    </div>`;
  }

  // Group: past (negative diff), today (0), upcoming (positive)
  const past     = windowed.filter(b => b.diff < 0);
  const today    = windowed.filter(b => b.diff === 0);
  const upcoming = windowed.filter(b => b.diff > 0);

  function bdayCard(b, cls = '') {
    const age      = b.year ? now.getFullYear() - b.year + (b.diff > 0 ? 1 : 0) : 0;
    const avatar   = b.photo
      ? `<img src="${b.photo}" class="bday-avatar bday-photo" alt="${b.name}"/>`
      : `<div class="bday-avatar">${b.initials || b.name.split(' ').map(n=>n[0]).slice(0,2).join('').toUpperCase()}</div>`;
    const diffLabel = b.diff === 0 ? '🎂 Heute!'
      : b.diff > 0 ? `in ${b.diff} Tag${b.diff===1?'':'en'}`
      : `vor ${Math.abs(b.diff)} Tag${Math.abs(b.diff)===1?'':'en'}`;
    const diffCls = b.diff === 0 ? 'bday-badge' : b.diff > 0 ? 'bday-soon' : 'bday-past-label';
    return `<div class="bday-item ${cls}">
      ${avatar}
      <div style="flex:1;min-width:0">
        <div class="bday-name">${b.name}</div>
        <div class="bday-date">${b.day}. ${MONTHS[b.month-1]}${age ? ' · ' + age + '. Geburtstag' : ''}</div>
      </div>
      <span class="${diffCls}">${diffLabel}</span>
    </div>`;
  }

  let html = '';
  if (today.length) {
    html += `<div class="data-section-label" style="color:var(--gold)">🎉 Heute Geburtstag!</div>`;
    today.forEach(b => { html += bdayCard(b, 'today'); });
  }
  if (upcoming.length) {
    html += `<div class="data-section-label" style="margin-top:${today.length?'10px':'0'}">Bevorstehend — nächste 14 Tage</div>`;
    upcoming.forEach(b => { html += bdayCard(b, 'this-month'); });
  }
  if (past.length) {
    html += `<div class="data-section-label" style="margin-top:8px;opacity:.6">Vergangene — letzte 14 Tage</div>`;
    past.slice().reverse().forEach(b => { html += bdayCard(b, 'bday-past'); });
  }
  return html;
}

// ── EVENTS DISPLAY ────────────────────────────────────────────
function renderEvents(list) {
  if (!list || list.length === 0) {
    return `<div class="empty-state">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/>
        <line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/>
      </svg>
      <p>Noch keine Termine importiert.</p>
      <span class="hint">Im Bearbeitungsmodus PDF importieren.</span>
    </div>`;
  }
  // Use current date at render time (not the startup `now`) so auto-refresh works
  const today = new Date(); today.setHours(0,0,0,0);
  const toDate = e => new Date(e.year || today.getFullYear(), e.month-1, e.day);
  const upcoming = list.filter(e => toDate(e) >= today).sort((a,b) => toDate(a)-toDate(b));
  const past     = list.filter(e => toDate(e) <  today).sort((a,b) => toDate(b)-toDate(a)); // newest first

  function eventCard(e, cls = '', extra = '') {
    const meta  = [e.time, e.loc ? `📍 ${e.loc}` : ''].filter(Boolean).join('  ·  ');
    const thema = (e.thema && e.thema !== e.title) ? e.thema : '';
    return `<div class="event-item ${cls}" ${extra}>
      <div class="event-date-block">
        <div class="eday">${e.day}</div>
        <div class="emon">${MONTHS_SHORT[e.month-1]}</div>
      </div>
      <div class="event-info">
        <div class="event-title">${e.title}</div>
        ${thema ? `<div class="event-thema">📌 Thema: ${thema}</div>` : ''}
        <div class="event-meta">${meta}</div>
      </div>
    </div>`;
  }

  let html = '';

  // 1 past event at TOP — grayed out
  if (past.length) {
    html += `<div class="data-section-label" style="opacity:.5">Zuletzt vergangen</div>`;
    html += eventCard(past[0], '', 'style="opacity:.45"');
  }

  // Upcoming events below — next is gold-highlighted
  if (upcoming.length) {
    html += `<div class="data-section-label"${past.length ? ' style="margin-top:8px"' : ''}>Kommende Termine</div>`;
    upcoming.forEach((e, i) => {
      html += eventCard(e, i === 0 ? 'upcoming' : '');
    });
  }

  return html;
}

// ── NAVIGATION ───────────────────────────────────────────────
function showSlide(n) {
  const slides = document.querySelectorAll('.slide');
  const total  = slides.length;
  slides.forEach((s,i) => {
    s.classList.remove('active','prev');
    if (i===n) s.classList.add('active');
    else if (i<n) s.classList.add('prev');
  });
  current = n;
  document.getElementById('progress-bar').style.width = `${((n+1)/total)*100}%`;
  document.getElementById('counter').textContent = `${n+1} / ${total}`;
  document.getElementById('btn-prev').classList.toggle('hidden', n===0);
  document.getElementById('btn-next').classList.toggle('hidden', n===total-1);

  // Auto-refresh data slides when navigated to (uses live date)
  if (!editMode) {
    const evEl = document.getElementById('events-list');
    const bdEl = document.getElementById('bday-list');
    if (evEl && slides[n]?.contains(evEl) && data.events) {
      evEl.innerHTML = renderEvents(data.events) +
        `<div class="data-watermark">${wheelSvg('currentColor','100%')}</div>`;
    }
    if (bdEl && slides[n]?.contains(bdEl) && data.birthdays) {
      bdEl.innerHTML = renderBirthdays(data.birthdays) +
        `<div class="data-watermark">${wheelSvg('currentColor','100%')}</div>`;
    }
  }
}
function navigate(dir) {
  showSlide(Math.max(0, Math.min(document.querySelectorAll('.slide').length-1, current+dir)));
}

// ── EDIT MODE ────────────────────────────────────────────────
function toggleEdit() {
  editMode = !editMode;
  document.body.classList.toggle('edit-mode', editMode);
  document.getElementById('btn-edit').classList.toggle('active', editMode);
  document.querySelectorAll('.editable-content').forEach(el => {
    el.contentEditable = editMode ? 'true' : 'false';
  });
  if (!editMode) saveData();
  toast(editMode ? '✏️ Bearbeitungsmodus aktiv' : 'Gespeichert ✓');
}

// ── TEXT FORMATTING ───────────────────────────────────────────
function ftExec(cmd, val) {
  document.execCommand(cmd, false, val || null);
}

function ftFont(id, fontName) {
  const el = document.getElementById('content-'+id);
  if (!el || !editMode) return;
  el.style.fontFamily = fontName;
  el.focus();
}

function ftSize(id, delta) {
  const el = document.getElementById('content-'+id);
  if (!el || !editMode) return;
  el.focus();
  const sel = window.getSelection();
  if (sel && sel.rangeCount > 0 && !sel.isCollapsed) {
    // Apply to selection via execCommand fontSize workaround
    const tag = `<span style="font-size:${delta>0?'larger':'smaller'}">${sel.toString()}</span>`;
    document.execCommand('insertHTML', false, tag);
  } else {
    // Apply to whole element
    const cur = parseFloat(getComputedStyle(el).fontSize) || 18;
    el.style.fontSize = Math.max(10, cur + delta) + 'px';
  }
  ftUpdateState(id);
}

function ftAlign(id, align) {
  const el = document.getElementById('content-'+id);
  if (!el || !editMode) return;
  el.focus();
  document.execCommand('justify' + align.charAt(0).toUpperCase() + align.slice(1), false, null);
}

function ftColor(id) {
  document.getElementById('ftcolor-'+id).click();
}

function ftUpdateState(id) {
  const el = document.getElementById('content-'+id);
  if (!el) return;
  // Update size display
  const sz = document.getElementById('ftsize-'+id);
  if (sz) sz.textContent = Math.round(parseFloat(getComputedStyle(el).fontSize)) + 'px';
  // Update bold/italic/underline active states
  ['b','i','u'].forEach(t => {
    const btn = document.getElementById('ft'+t+'-'+id);
    if (!btn) return;
    const cmds = {b:'bold',i:'italic',u:'underline'};
    btn.classList.toggle('active', document.queryCommandState(cmds[t]));
  });
}

// ── FREE-POSITION IMAGES (multiple per slide, drag + resize) ──
let _drag = null; // active drag/resize state

function getFImgs(id)       { return data['fimgs_'+id] || []; }
function setFImgs(id, imgs) { data['fimgs_'+id] = imgs; saveData(); }

// Build the floating image layer HTML for one slide
function buildFImgLayer(agendaId) {
  const imgs = getFImgs(agendaId);
  const items = imgs.map((img, idx) => `
    <div class="fi-item" id="fi-${agendaId}-${idx}"
      style="left:${img.x.toFixed(2)}%;top:${img.y.toFixed(2)}%;width:${img.w.toFixed(2)}%;height:${img.h.toFixed(2)}%"
      onmousedown="fiStartDrag(event,'${agendaId}',${idx})"
      ontouchstart="fiStartDragT(event,'${agendaId}',${idx})">
      <img src="${img.src}" draggable="false" alt=""/>
      <button class="fi-del" onclick="deleteFImg('${agendaId}',${idx});event.stopPropagation()" ontouchend="deleteFImg('${agendaId}',${idx});event.stopPropagation()">✕</button>
      <div class="fi-handle"
        onmousedown="fiStartResize(event,'${agendaId}',${idx});event.stopPropagation()"
        ontouchstart="fiStartResizeT(event,'${agendaId}',${idx});event.stopPropagation()"></div>
    </div>`).join('');

  return `<div class="free-img-layer" id="fil-${agendaId}">
    ${items}
    <button class="fi-add-btn" onclick="fImgAdd('${agendaId}')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="13" height="13">
        <path d="M23 19a2 2 0 01-2 2H3a2 2 0 01-2-2V8a2 2 0 012-2h4l2-3h6l2 3h4a2 2 0 012 2z"/>
        <circle cx="12" cy="13" r="4"/>
      </svg>
      Bild hinzufügen
    </button>
    <input type="file" id="fimginput-${agendaId}" accept="image/*" multiple
           style="display:none" onchange="fImgFiles(event,'${agendaId}')"/>
  </div>`;
}

function refreshFImgLayer(agendaId) {
  const el = document.getElementById('fil-'+agendaId);
  if (el) el.outerHTML = buildFImgLayer(agendaId);
}

// Add image(s)
function fImgAdd(id) { document.getElementById('fimginput-'+id).click(); }
function fImgFiles(event, id) {
  [...event.target.files].forEach(file => compressAndAddFImg(id, file));
  event.target.value = '';
}

function compressAndAddFImg(id, file) {
  const imgEl = new Image(), url = URL.createObjectURL(file);
  imgEl.onload = () => {
    const MAX = 1600; let w = imgEl.width, h = imgEl.height;
    if (w > MAX) { h = Math.round(h*MAX/w); w = MAX; }
    const c = document.createElement('canvas'); c.width=w; c.height=h;
    c.getContext('2d').drawImage(imgEl, 0, 0, w, h);
    const src = c.toDataURL('image/jpeg', 0.82);
    URL.revokeObjectURL(url);
    const imgs = getFImgs(id);
    const off  = imgs.length * 3;
    imgs.push({ src, x: 5+off, y: 5+off, w: 38, h: 32 });
    setFImgs(id, imgs);
    refreshFImgLayer(id);
    toast('Bild hinzugefügt ✓');
  };
  imgEl.src = url;
}

function deleteFImg(id, idx) {
  const imgs = getFImgs(id); imgs.splice(idx, 1);
  setFImgs(id, imgs); refreshFImgLayer(id);
}

// ── DRAG (move) ───────────────────────────────────────────────
function fiStartDrag(e, id, idx) {
  if (!editMode) return;
  e.preventDefault(); e.stopPropagation();
  const layer = document.getElementById('fil-'+id);
  const item  = document.getElementById(`fi-${id}-${idx}`);
  if (!layer||!item) return;
  const lr = layer.getBoundingClientRect(), ir = item.getBoundingClientRect();
  _drag = { type:'move', id, idx,
    lw: lr.width, lh: lr.height,
    cx: e.clientX, cy: e.clientY,
    ox: (ir.left-lr.left)/lr.width*100,
    oy: (ir.top-lr.top)/lr.height*100,
    ow: ir.width/lr.width*100, oh: ir.height/lr.height*100 };
  item.style.cursor = 'grabbing';
}
function fiStartDragT(e, id, idx) {
  if (!editMode || !e.touches.length) return;
  e.stopPropagation();
  const t = e.touches[0];
  fiStartDrag({ clientX: t.clientX, clientY: t.clientY,
    preventDefault: ()=>{}, stopPropagation: ()=>{} }, id, idx);
}

// ── RESIZE ────────────────────────────────────────────────────
function fiStartResize(e, id, idx) {
  if (!editMode) return;
  e.preventDefault(); e.stopPropagation();
  const layer = document.getElementById('fil-'+id);
  const item  = document.getElementById(`fi-${id}-${idx}`);
  if (!layer||!item) return;
  const lr = layer.getBoundingClientRect(), ir = item.getBoundingClientRect();
  _drag = { type:'resize', id, idx,
    lw: lr.width, lh: lr.height,
    cx: e.clientX, cy: e.clientY,
    ox: (ir.left-lr.left)/lr.width*100,
    oy: (ir.top-lr.top)/lr.height*100,
    ow: ir.width/lr.width*100, oh: ir.height/lr.height*100 };
}
function fiStartResizeT(e,id,idx){fiStartResize(e.touches[0]&&{clientX:e.touches[0].clientX,clientY:e.touches[0].clientY,preventDefault:()=>{},stopPropagation:()=>{}},id,idx);}

// Global move + up
document.addEventListener('mousemove', e => {
  if (!_drag) return;
  const item = document.getElementById(`fi-${_drag.id}-${_drag.idx}`);
  if (!item) return;
  const dx = (e.clientX - _drag.cx) / _drag.lw * 100;
  const dy = (e.clientY - _drag.cy) / _drag.lh * 100;
  if (_drag.type === 'move') {
    item.style.left = Math.max(0, Math.min(90, _drag.ox + dx)).toFixed(2) + '%';
    item.style.top  = Math.max(0, Math.min(90, _drag.oy + dy)).toFixed(2) + '%';
  } else {
    item.style.width  = Math.max(8, _drag.ow + dx).toFixed(2) + '%';
    item.style.height = Math.max(6, _drag.oh + dy).toFixed(2) + '%';
  }
});
document.addEventListener('mouseup', () => {
  if (!_drag) return;
  const { id, idx } = _drag;
  const item  = document.getElementById(`fi-${id}-${idx}`);
  const layer = document.getElementById(`fil-${id}`);
  if (item) item.style.cursor = 'move';
  if (item && layer) {
    const lr = layer.getBoundingClientRect(), ir = item.getBoundingClientRect();
    const imgs = getFImgs(id);
    if (imgs[idx]) {
      imgs[idx].x = (ir.left-lr.left)/lr.width*100;
      imgs[idx].y = (ir.top-lr.top)/lr.height*100;
      imgs[idx].w = ir.width/lr.width*100;
      imgs[idx].h = ir.height/lr.height*100;
      setFImgs(id, imgs);
    }
  }
  _drag = null;
});
document.addEventListener('touchmove', e => {
  if (!_drag || !e.touches.length) return;
  const t = e.touches[0];
  document.dispatchEvent(new MouseEvent('mousemove', { clientX: t.clientX, clientY: t.clientY }));
}, { passive: true });
document.addEventListener('touchend', () => {
  if (_drag) document.dispatchEvent(new MouseEvent('mouseup'));
});

// ── TITLE IMAGE ───────────────────────────────────────────────
function triggerTitleUpload() { document.getElementById('title-file-input').click(); }
function handleTitleImage(event) {
  const file = event.target.files[0]; if (!file) return;
  const img = new Image(), url = URL.createObjectURL(file);
  img.onload = () => {
    const MAX=1920; let w=img.width, h=img.height;
    if (w>MAX) { h=Math.round(h*MAX/w); w=MAX; }
    const canvas = document.createElement('canvas');
    canvas.width=w; canvas.height=h;
    canvas.getContext('2d').drawImage(img,0,0,w,h);
    const src = canvas.toDataURL('image/jpeg', 0.82);
    URL.revokeObjectURL(url);
    data.titleImage = src;
    // Update bottom image panel
    const imgBottom = document.querySelector('.title-img-bottom');
    if (imgBottom) {
      // Replace placeholder or existing fill
      let fill = imgBottom.querySelector('.img-fill');
      if (!fill) {
        imgBottom.querySelector('.img-placeholder')?.remove();
        fill = document.createElement('div');
        fill.className = 'img-fill';
        imgBottom.insertBefore(fill, imgBottom.firstChild);
      }
      fill.style.backgroundImage = `url('${src}')`;
    }
    saveData(); toast('Bild gespeichert ✓');
  };
  img.src = url;
}

// ── UTILS ─────────────────────────────────────────────────────
function toggleFullscreen() {
  if (!document.fullscreenElement) document.documentElement.requestFullscreen().catch(()=>{});
  else document.exitFullscreen();
}
let _t;
function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent=msg; el.classList.add('show');
  clearTimeout(_t); _t=setTimeout(()=>el.classList.remove('show'),2400);
}

// ── KEYBOARD ─────────────────────────────────────────────────
document.addEventListener('keydown', e => {
  if (editMode && document.activeElement?.contentEditable==='true') return;
  if (e.key==='ArrowRight'||e.key==='ArrowDown'||e.key===' ') { e.preventDefault(); navigate(1); }
  if (e.key==='ArrowLeft' ||e.key==='ArrowUp')                  { e.preventDefault(); navigate(-1); }
  if (e.key==='f'||e.key==='F') toggleFullscreen();
  if (e.key==='e'||e.key==='E') toggleEdit();
  if (e.key==='s'&&(e.ctrlKey||e.metaKey)) { e.preventDefault(); saveData(); }
});

// ── INIT ─────────────────────────────────────────────────────
loadData();
buildSlides();
showSlide(0);
</script>
